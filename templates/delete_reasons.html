<!DOCTYPE html>
<html>
<head>
    <title>Deletion Reasons</title>
</head>
<body>
<style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color:#3498db;
            color:blueviolet;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            
        }
        table {
            margin: 0 auto;
            width: 100%;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            color: gainsboro;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        </style>
<h2>User Deletion Reasons</h2>
<div class="container">
<table border="1" cellpadding="5">
    <tr>
        <th>ID</th>
        <th>Reason</th>
        <th>Created At</th>
    </tr>

    {% for row in reasons %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="{{ url_for('admin') }}">Back to Admin Dashboard</a>
</div>
</body>
</html>
