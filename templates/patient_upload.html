<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient upload data</title>
</head>
<body>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color:#3498db;
            color:blueviolet;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            
        }

        </style>
        <div class="container">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Name</label>
        <input type="text" name="name" required>
        <br><br>
        <label>Sex</label>
        <input type="text" name="sex" required>
        <br><br>
        <label>Age</label>
        <input type="number" name="age" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    </div>
</body>
</html>
