<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color:#3498db;
            color:blueviolet;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            color: gainsboro;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        </style>
    <h2>Your Record</h2>
    <div class="container">
    {% if record %}

    <p>Name: {{ record.name }}</p>
    <br>
    <p>Age: {{ record.age }}</p>
    <br>
    <p>Created: {{ record.createdOn }}</p>
    <br>
    <p>Last Updated: {{ record.updatedOn }}</p>
    <br>

    {% else %}

    <p>No record found.</p>

    {% endif %}

    <a href="{{ url_for('home') }}">Go home instead</a>
    <br><br>
    <a href="{{ url_for('logout')}}">Log out</a>
    </div>
</body>
</html>
