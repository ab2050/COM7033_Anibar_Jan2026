<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register here</title>
</head>
<body>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color:#3498db;
            color:black;
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            
        }

        </style>
    <div class="container">
    <img src="{{ url_for('static', filename='signup.png') }}" width="200">
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        {% if message %}
            <p style="color:aqua;">{{ message }}</p>
        {% endif %}

        Name : 
        <input type="text" name="name" value="{{ name }}" required>
        <br><br>
        Email : 
        <input type="text" name="email" required>
        <br><br>
        Password :
        <input type="password" name="password" required>
        <br><br>

        <button type="submit">REGISTER CLICK HERE !!!!</button>
    </form>
    <br><br>

<a href="{{ url_for('home') }}">Go Home</a>
</div>
</body>
</html>
